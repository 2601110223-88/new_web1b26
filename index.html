<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAEL - Collection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section>
        <header class="navbar">
            <h1>DAEL</h1>
            <nav class="top-row">
                <ul class="menu">
                    <li><a href="">NEW</a></li>
                    <li><a href="">BEST THINGS</a></li>
                    <li><a href="">SHOP ALL</a></li>
                    <li><a href="">COLLECTION</a></li>
                </ul>
            </nav>
        </header>

        <main class="imge">
            <div class="slider-container">
                <button class="prev-btn"> &#10094; </button>
                
                <div class="image-wrapper">
                    <img src="imgh1.jpg" alt="이미지1">
                    <img src="imgh15.jpg" alt="이미지2">
                    <img src="imgh3.jpg" alt="이미지3">
                    <img src="imgh4.jpg" alt="이미지4">
                    <img src="imgh5.jpg" alt="이미지5">
                    <img src="imgh6.jpg" alt="이미지6">
                    <img src="imgh7.jpg" alt="이미지7">
                </div>

                <button class="next-btn"> &#10095; </button>
            </div>
        </main>
    </section>

    <script>
        const wrapper = document.querySelector('.image-wrapper');
const prevBtn = document.querySelector('.prev-btn');
const nextBtn = document.querySelector('.next-btn');
const totalImages = document.querySelectorAll('.image-wrapper img').length;

let index = 0; // 0부터 시작 (마지막부터 시작하려면 totalImages - 1)
let autoSlide; // 타이머 변수

// 슬라이드 이동 함수
function updateSlider() {
    wrapper.style.transform = `translateX(${-index * 100}%)`;
}

// 다음 이미지로 넘어가는 함수
function nextSlide() {
    index = (index < totalImages - 1) ? index + 1 : 0;
    updateSlider();
}

// 이전 이미지로 넘어가는 함수
function prevSlide() {
    index = (index > 0) ? index - 1 : totalImages - 1;
    updateSlider();
}

// 자동 슬라이드 시작 함수 (3초마다 실행)
function startAutoSlide() {
    autoSlide = setInterval(nextSlide, 3000); // 3000ms = 3초
}

// 자동 슬라이드 멈춤 함수 (사용자가 버튼 클릭 시)
function stopAutoSlide() {
    clearInterval(autoSlide);
    startAutoSlide(); // 클릭 후 다시 3초부터 시작하도록 재설정
}

// 버튼 이벤트 연결
nextBtn.addEventListener('click', () => {
    nextSlide();
    stopAutoSlide();
});

prevBtn.addEventListener('click', () => {
    prevSlide();
    stopAutoSlide();
});

// 페이지 로드 시 자동 슬라이드 시작
startAutoSlide();
    </script>
</body>
</html>
